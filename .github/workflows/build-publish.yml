name: Build and Publish to PyPI

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  build:
    name: Build - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            plat_name: manylinux2014_x86_64
          - os: macos-latest
            plat_name: ""
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ matrix.os }}
          max-size: 100M

      - name: use-ccache
        run: |
          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get -y install python3 python3-pip g++ cmake python3-ply python3-pygraphviz git python3-tk tix pkg-config libssl-dev

      - name: Install Python build deps
        run: pip install build wheel setuptools

      - name: Build submodules
        run: python build_submodules.py

      - name: Build wheel (Linux)
        if: runner.os == 'Linux'
        run: python setup.py bdist_wheel --plat-name ${{ matrix.plat_name }}

      - name: Build wheel (macOS)
        if: runner.os == 'macOS'
        run: python -m build --wheel

      - run: ls -l dist

      - uses: actions/upload-artifact@v4
        with:
          name: ivy-wheels-${{ matrix.os }}
          path: dist/

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: ivy-wheels-*
          path: dist/
          merge-multiple: true

      - run: ls -l dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip_existing: true
          verbose: true
