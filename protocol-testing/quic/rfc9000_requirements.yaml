  rfc9000:17.2.3.4:
    text: 'Therefore, in

      determining the length of the packet number encoding for 0-RTT

      packets, a client MUST assume that all packets up to the current

      packet number are in flight, starting from a packet number of 0.'
    section: 17.2.3
    level: MUST
    layer: packet-format
    testable: true
  rfc9000:17.2.4:
    text: "Handshake packets MAY contain\t \t       PING, PADDING, or ACK frames."
    section: 17.2.4
    level: MAY
    layer: packet-format
    testable: true
  rfc9000:17.2.4.2:
    text: 'Handshake packets MAY contain

      CONNECTION_CLOSE frames of type 0x1c.'
    section: 17.2.4
    level: MAY
    layer: packet-format
    testable: true
  rfc9000:17.2.4.3:
    text: "Endpoints MUST treat receipt\t \t   CONNECTION_CLOSE frames of type 0x1c."
    section: 17.2.4
    level: MUST
    layer: packet-format
    testable: true
  rfc9000:17.2.4.4:
    text: 'Endpoints MUST treat receipt

      of Handshake packets with other frames as a connection error.'
    section: 17.2.4
    level: MUST
    layer: packet-format
    testable: true
  rfc9000:17.2.5.3:
    text: "A client MUST use the same\t \trestrictions as the first Initial packet."
    section: 17.2.5.3
    level: MUST
    layer: packet-format
    testable: true
  rfc9000:17.2.5.3.2:
    text: 'A client MUST use the same

      cryptographic handshake message it includes in this packet.'
    section: 17.2.5.3
    level: MUST
    layer: packet-format
    testable: true
  rfc9000:17.2.5.3.3:
    text: "A server\nMAY treat a packet that contains a different cryptographic handshake\t \tMAY treat a packet that contains\
      \ a different cryptographic handshake\nmessage as a connection error or discard it."
    section: 17.2.5.3
    level: MAY
    layer: packet-format
    testable: true
  rfc9000:17.2.5.3.4:
    text: "A client MAY attempt 0-RTT after receiving a Retry packet by sending\t \tA client MAY attempt 0-RTT after receiving\
      \ a Retry packet by sending\n0-RTT packets to the connection ID provided by the server."
    section: 17.2.5.3
    level: MAY
    layer: packet-format
    testable: true
  rfc9000:17.2.5.3.5:
    text: 'MUST NOT change the cryptographic handshake message it sends in

      response to receiving a Retry.'
    section: 17.2.5.3
    level: MUST NOT
    layer: packet-format
    testable: true
  rfc9000:17.2.5.3.6:
    text: "A client MUST NOT reset the packet number for any packet number space\t \tA client MUST NOT reset the packet number\
      \ for any packet number space\nafter processing a Retry packet; Section 17."
    section: 17.2.5.3
    level: MUST NOT
    layer: packet-format
    testable: true
  rfc9000:17.2.5.3.7:
    text: "A server MAY abort the connection if it\n \t                                                                  \
      \      detects that the client reset the packet number."
    section: 17.2.5.3
    level: MAY
    layer: packet-format
    testable: true
  rfc9000:17.2.5.3.8:
    text: "If the client received and processed a Retry packet, it MUST validate\t \tThe connection IDs used in Initial and\
      \ Retry packets exchanged\nthat the retry_source_connection_id transport parameter is present\t \t    between client\
      \ and server are copied to the transport parameters and\nand correct; otherwise, it MUST validate that the transport\
      \ parameter\t \tvalidated as described in Section 7."
    section: 17.2.5.3
    level: MUST
    layer: packet-format
    testable: true
  rfc9000:17.2.5.3.9:
    text: 'A client MUST treat a failed validation as a connection

      error of type PROTOCOL_VIOLATION.'
    section: 17.2.5.3
    level: MUST
    layer: packet-format
    testable: true
