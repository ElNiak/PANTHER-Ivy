  rfc9000:7.3:
    text: "Authenticating Connection IDs\n\nThe values provided by a peer for these transport parameters MUST\t     The values\
      \ provided by a peer for these transport parameters (cid related) MUST\nmatch the values that an endpoint used in the\
      \ Destination and Source\t  match the values that an endpoint used in the Destination and Source\nConnection ID fields\
      \ of Initial packets that it sent."
    section: '7.3'
    level: MUST
    layer: handshake
    testable: true
  rfc9000:7.3.2:
    text: "Endpoints MUST validate that received transport\t-> OK\nensures that that an attacker cannot influence the choice\
      \ of\t        parameters match received connection ID values."
    section: '7.3'
    level: MUST
    layer: handshake
    testable: true
  rfc9000:7.4.1:
    text: "2) MUST\t      Remembered transport parameters apply to the new connection until the\nspecify whether they MUST,\
      \ MAY, or MUST NOT be stored for 0-RTT."
    section: 7.4.1
    level: MUST
    layer: handshake
    testable: true
  rfc9000:7.4.1.2:
    text: "2) MUST\n                                                                        specify whether storing the transport\
      \ parameter for 0-RTT is\n                                                                        mandatory, optional,\
      \ or prohibited."
    section: 7.4.1
    level: MUST
    layer: handshake
    testable: true
  rfc9000:7.4.1.3:
    text: 'A server MAY store and recover the previously sent values of the

      max_idle_timeout, max_udp_payload_size, and disable_active_migration

      parameters and reject 0-RTT if it selects smaller values.'
    section: 7.4.1
    level: MAY
    layer: handshake
    testable: true
  rfc9000:7.4.1.4:
    text: 'A server MUST either reject 0-RTT data **or** abort a handshake if the      A server MUST reject 0-RTT data if
      the **restored** values for transport

      implied values for transport parameters cannot be supported.'
    section: 7.4.1
    level: MUST
    layer: handshake
    testable: true
  rfc9000:8:
    text: "1) and during connection migration (see\t       not yet validated, an endpoint MUST limit the amount of data it\
      \ sends\nSection 8."
    section: '8'
    level: MUST
    layer: address-validation
    testable: true
  rfc9000:8.1:
    text: 'Address Validation during Connection Establishment


      Additionally, an endpoint MAY consider the peer address validated if

      the peer uses a connection ID chosen by the endpoint and the

      connection ID contains at least 64 bits of entropy.'
    section: '8.1'
    level: MAY
    layer: address-validation
    testable: true
  rfc9000:8.1.4:
    text: 'Address Validation Token Integrity


      An address validation token MUST be difficult to guess.'
    section: 8.1.4
    level: MUST
    layer: address-validation
    testable: true
  rfc9000:8.1.4.2:
    text: "Including a\t   An address validation token MUST be difficult to guess."
    section: 8.1.4
    level: MUST
    layer: address-validation
    testable: true
