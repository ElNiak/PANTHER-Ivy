    section: 8.1.4
    level: MUST
    layer: address-validation
    testable: true
  rfc9000:8.1.4.4:
    text: 'To protect against such attacks, servers MUST ensure that

      accepted.'
    section: 8.1.4
    level: MUST
    layer: address-validation
    testable: true
  rfc9000:8.1.4.5:
    text: 'Servers SHOULD ensure that

      longer validity periods.'
    section: 8.1.4
    level: SHOULD
    layer: address-validation
    testable: true
  rfc9000:8.1.4.6:
    text: "Tokens MAY include additional information\t \t   tokens sent in Retry packets are only accepted for a short time,\
      \ as\nabout clients to further narrow applicability or reuse."
    section: 8.1.4
    level: MAY
    layer: address-validation
    testable: true
  rfc9000:8.1.4.7:
    text: "7) need to be valid for longer but\n                                                                          \
      \ SHOULD NOT be accepted multiple times."
    section: 8.1.4
    level: SHOULD NOT
    layer: address-validation
    testable: true
  rfc9000:8.1.4.8:
    text: "Servers are encouraged to\n                                                                           allow tokens\
      \ to be used only once, if possible; tokens MAY include\n                                                          \
      \                 additional information about clients to further narrow applicability\n                           \
      \                                                or reuse."
    section: 8.1.4
    level: MAY
    layer: address-validation
    testable: true
  rfc9000:8.2.1:
    text: "Initiating Path Validation\n\nAn endpoint MUST expand datagrams that contain a PATH_CHALLENGE frame\nto at least\
      \ the smallest allowed maximum datagram size of 1200 bytes,\n**unless the anti-amplification limit for the path** does\
      \ not permit\t -> impossible to know ?\nsending a datagram of this size."
    section: 8.2.1
    level: MUST
    layer: address-validation
    testable: true
  rfc9000:8.2.1.2:
    text: 'To ensure that the path MTU is large enough, the endpoint

      MUST perform a second path validation by sending a PATH_CHALLENGE

      frame in a datagram of at least 1200 bytes.'
    section: 8.2.1
    level: MUST
    layer: address-validation
    testable: true
  rfc9000:8.2.1.3:
    text: 'Unlike other cases where datagrams are expanded, endpoints MUST NOT

      discard datagrams that appear to be too small when they contain

      PATH_CHALLENGE or PATH_RESPONSE.'
    section: 8.2.1
    level: MUST NOT
    layer: address-validation
    testable: true
  rfc9000:8.2.2:
    text: 'Path Validation Responses


      On receiving a PATH_CHALLENGE frame, an endpoint MUST respond by

      echoing the data contained in the PATH_CHALLENGE frame in a

      PATH_RESPONSE frame.'
    section: 8.2.2
    level: MUST
    layer: address-validation
    testable: true
  rfc9000:8.2.2.2:
    text: '-> OK

      An endpoint MUST NOT delay transmission of a

      packet containing a PATH_RESPONSE frame unless constrained by

      congestion control.'
    section: 8.2.2
    level: MUST NOT
    layer: address-validation
    testable: true
  rfc9000:8.2.2.3:
    text: '-> Impossible to know


      A PATH_RESPONSE frame MUST be sent on the network path where the

      PATH_CHALLENGE frame was received.'
    section: 8.2.2
    level: MUST
    layer: address-validation
    testable: true
  rfc9000:8.2.2.4:
    text: 'This requirement MUST NOT be enforced by the endpoint that initiates

      path validation, as that would enable an attack on migration; see

      Section 9.'
    section: 8.2.2
    level: MUST NOT
    layer: address-validation
    testable: true
  rfc9000:8.2.2.5:
    text: 'An endpoint MUST expand datagrams that contain a PATH_RESPONSE frame

      to at least the smallest allowed maximum datagram size of 1200 bytes.'
    section: 8.2.2
    level: MUST
    layer: address-validation
    testable: true
  rfc9000:8.2.2.6:
    text: 'However, an endpoint MUST NOT expand the

      datagram containing the PATH_RESPONSE if the resulting data exceeds

      the anti-amplification limit.'
    section: 8.2.2
    level: MUST NOT
    layer: address-validation
    testable: true
  rfc9000:8.2.3:
    text: "However, the endpoint MUST initiate\n                                                                         another\
      \ path validation with an expanded datagram to verify that the\n                                                   \
      \                      path supports the required MTU."
    section: 8.2.3
    level: MUST
    layer: address-validation
    testable: true
  rfc9000:8.2.4:
    text: "An endpoint\t that has no valid network path to its peer MAY signal this using the\nNO_VIABLE_PATH connection error,\
      \ noting that this is only possible if\nthe network path exists but does not support the required MTU\n(Section 14)."
    section: 8.2.4
    level: MAY
    layer: address-validation
    testable: true
  rfc9000:9.2:
    text: 'An endpoint MAY defer path

      validation until after a peer sends the next non-probing frame to its

      new address.'
    section: '9.2'
    level: MAY
    layer: migration
    testable: true
  rfc9000:9.3:
    text: 'Responding to Connection Migration


      If the recipient permits the migration, it MUST send subsequent

      packets to the new peer address and MUST initiate path validation

      (Section 8.'
    section: '9.3'
    level: MUST
    layer: migration
    testable: true
  rfc9000:9.6.2:
    text: 'Migration to a Preferred Address


      A client that migrates to a preferred address MUST validate the

      address it chooses before migrating; see Section 21.'
    section: 9.6.2
    level: MUST
    layer: migration
    testable: true
  rfc9000:10.1:
    text: 'Idle Timeout


      To avoid excessively small idle timeout periods, endpoints MUST

      increase the idle timeout period to be at least three times the

      current Probe Timeout (PTO).'
    section: '10.1'
    level: MUST
    layer: termination
    testable: true
  rfc9000:10.2:
    text: 'frame SHOULD respond to any incoming packet that can be decrypted

      with another packet containing a CONNECTION_CLOSE frame.'
    section: '10.2'
    level: SHOULD
    layer: termination
    testable: true
  rfc9000:10.2.2:
    text: "Such an\t     An immediate close can be used after an application protocol has\nendpoint SHOULD limit the number\
      \ of packets it generates containing a\t arranged to close a connection."
    section: '10.2'
    level: SHOULD
    layer: termination
    testable: true
  rfc9000:10.2.3:
    text: "These states SHOULD persist for at least three\n                                                              \
      \           times the current PTO interval as defined in [QUIC-RECOVERY]."
    section: '10.2'
    level: SHOULD
    layer: termination
    testable: true
  rfc9000:10.2.4:
    text: "Endpoints that have some alternative means to ensure that late-\n                                             \
      \                            arriving packets do not induce a response, such as those that are\n                   \
      \                                                      able to close the UDP socket, MAY end these states earlier to\
      \ allow\n                                                                         for faster resource recovery."
    section: '10.2'
    level: MAY
    layer: termination
    testable: true
  rfc9000:10.2.5:
    text: "Servers that retain an open socket for\n                                                                      \
      \   accepting new connections SHOULD NOT end the closing or draining\n                                             \
      \                            state early."
    section: '10.2'
    level: SHOULD NOT
    layer: termination
    testable: true
  rfc9000:10.2.6:
    text: "Once its closing or draining state ends, an endpoint SHOULD discard\n                                         \
      \                               all connection state."
    section: '10.2'
    level: SHOULD
    layer: termination
    testable: true
  rfc9000:10.2.7:
    text: "The endpoint MAY send a Stateless Reset in\n                                                                  \
      \      response to any further incoming packets belonging to this\n                                                \
      \                        connection."
    section: '10.2'
    level: MAY
    layer: termination
    testable: true
  rfc9000:10.2.1:
    text: 'An endpoint MAY drop packet protection keys when entering the closing

      state and send a packet containing a CONNECTION_CLOSE frame in

      response to any UDP datagram that is received.'
    section: 10.2.1
    level: MAY
    layer: termination
    testable: true
  rfc9000:10.2.1.2:
    text: 'To avoid being used for an amplification attack,

      such endpoints MUST limit the cumulative size of packets it sends to

      three times the cumulative size of the packets that are received and

      attributed to the connection.'
    section: 10.2.1
    level: MUST
    layer: termination
    testable: true
  rfc9000:10.2.1.3:
    text: 'To minimize the state that an endpoint

      maintains for a closing connection, endpoints MAY send the exact same

      packet in response to any received packet.'
    section: 10.2.1
    level: MAY
    layer: termination
    testable: true
  rfc9000:11.1:
    text: 'As the AEAD for Initial packets does not provide strong

      authentication, an endpoint MAY discard an invalid Initial packet.'
    section: '11.1'
    level: MAY
    layer: error
    testable: true
  rfc9000:12.4:
    text: "Frames and Frame Type\n\n\nThe payload of a packet that contains frames MUST contain at least\t \t   The payload\
      \ of a packet that contains frames MUST contain at least\none frame, and MAY contain multiple frames and multiple frame\
      \ types."
    section: '12.4'
    level: MUST
    layer: packet
    testable: true
  rfc9000:12.4.2:
    text: one frame, and MAY contain multiple frames and multiple frame types.
    section: '12.4'
    level: MAY
    layer: packet
    testable: true
  rfc9000:12.4.3:
    text: "Frames always fit within a single QUIC packet and cannot span\t \t         An endpoint MUST treat receipt of a\
      \ packet containing no frames as a\nmultiple packets."
    section: '12.4'
    level: MUST
    layer: packet
    testable: true
  rfc9000:12.4.4:
    text: "The\nrules here generalize those of TLS, in that frames associated with\nestablishing the connection can usually\
      \ appear in packets in any\npacket number space, whereas those associated with transferring data\ncan only appear in\
      \ the application data packet number space:\n\n*  PADDING, PING, and CRYPTO frames MAY appear in any packet number\n\
      \   space."
    section: '12.4'
    level: MAY
    layer: packet
    testable: true
  rfc9000:12.4.5:
    text: "*  CONNECTION_CLOSE frames signaling errors at the QUIC layer (type\n   0x1c) MAY appear in any packet number space."
    section: '12.4'
    level: MAY
    layer: packet
    testable: true
  rfc9000:12.4.6:
    text: "CONNECTION_CLOSE\n   frames signaling application errors (type 0x1d) MUST only appear\n   in the application data\
      \ packet number space."
    section: '12.4'
    level: MUST
    layer: packet
    testable: true
  rfc9000:12.4.7:
    text: "*  ACK frames MAY appear in any packet number space but can only\n   acknowledge packets that appeared in that\
      \ packet number space."
    section: '12.4'
    level: MAY
    layer: packet
    testable: true
  rfc9000:12.4.8:
    text: "*  All other frame types MUST only be sent in the application data\n   packet number space."
    section: '12.4'
    level: MUST
    layer: packet
    testable: true
  rfc9000:12.4.9:
    text: 'A server MAY treat receipt

      of these frames in 0-RTT packets as a connection error of type

      PROTOCOL_VIOLATION.'
    section: '12.4'
    level: MAY
    layer: packet
    testable: true
  rfc9000:13.2.1:
    text: 'Sending ACK Frames


      An endpoint MUST acknowledge all ack-eliciting Initial and Handshake

      packets immediately and all ack-eliciting 0-RTT and 1-RTT packets

      within its advertised max_ack_delay, with the following exception.'
    section: 13.2.1
    level: MUST
    layer: loss-recovery
    testable: true
  rfc9000:13.2.1.2:
    text: 'An endpoint SHOULD

      send an ACK frame with other frames when there are new ack-eliciting

      packets to acknowledge.'
    section: 13.2.1
    level: SHOULD
    layer: loss-recovery
    testable: true
  rfc9000:13.2.1.3:
    text: 'When only non-ack-eliciting packets need to

      be acknowledged, an endpoint MAY choose not to send an ACK frame with

      outgoing frames until an ack-eliciting packet has been received.'
    section: 13.2.1
    level: MAY
    layer: loss-recovery
    testable: true
  rfc9000:13.2.1.4:
    text: 'In

      that case, an endpoint MUST NOT send an ack-eliciting frame in all

      packets that would otherwise be non-ack-eliciting, to avoid an

      infinite feedback loop of acknowledgments.'
    section: 13.2.1
    level: MUST NOT
    layer: loss-recovery
    testable: true
  rfc9000:13.2.1.5:
    text: "-> not possible to test\n\nIn order to assist loss detection at the sender, an endpoint SHOULD\t \t   In order\
      \ to assist loss detection at the sender, an endpoint SHOULD\nsend an ACK frame immediately on receiving an ack-eliciting\
      \ packet\t \t   generate and send an ACK frame without delay when it receives an ack-\nthat is out of order."
    section: 13.2.1
    level: SHOULD
    layer: loss-recovery
    testable: true
  rfc9000:13.2.1.6:
    text: "The endpoint SHOULD NOT continue sending ACK\t \t   eliciting packet either:\nframes immediately unless more ack-eliciting\
      \ packets are received out\nof order."
    section: 13.2.1
    level: SHOULD NOT
    layer: loss-recovery
    testable: true
  rfc9000:13.2.1.7:
    text: "If every subsequent ack-eliciting packet arrives out of\t \t    *  when the received packet has a packet number\
      \ less than another\norder, then an ACK frame SHOULD be sent immediately for every\t \t             ack-eliciting packet\
      \ that has been received, or\n                                                                               received\
      \ ack-eliciting packet."
    section: 13.2.1
    level: SHOULD
    layer: loss-recovery
    testable: true
  rfc9000:13.2.5:
    text: 'An endpoint MUST NOT include delays that it

      does not control when populating the ACK Delay field in an ACK frame.'
    section: 13.2.5
    level: MUST NOT
    layer: loss-recovery
    testable: true
  rfc9000:13.2.5.2:
    text: 'However, endpoints SHOULD include buffering delays caused by

      unavailability of decryption keys, since these delays can be large

      and are likely to be non-repeating.'
    section: 13.2.5
    level: SHOULD
    layer: loss-recovery
    testable: true
  rfc9000:13.2.5.3:
    text: 'When the measured acknowledgment delay is larger than its

      max_ack_delay, an endpoint SHOULD report the measured delay.'
    section: 13.2.5
    level: SHOULD
    layer: loss-recovery
    testable: true
  rfc9000:13.3:
    text: 'Retransmission of Information


      A sender SHOULD avoid retransmitting information from packets once

      they are acknowledged.'
    section: '13.3'
    level: SHOULD
    layer: loss-recovery
    testable: true
