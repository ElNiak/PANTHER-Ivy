rfc: RFC9000
title: 'QUIC: A UDP-Based Multiplexed and Secure Transport'
requirements:
  rfc9000:4.1:
    text: 'Data Flow Control


      * senders MUST NOT send data in excess of either limit.'
    section: '4.1'
    level: MUST NOT
    layer: flow-control
    testable: true
  rfc9000:4.6:
    text: 'If either is received, the connection MUST be closed

      immediately with a connection error of type TRANSPORT_PARAMETER_ERROR

      if the offending value was received in a transport parameter or of

      type FRAME_ENCODING_ERROR if it was received in a frame; see

      Section 10.'
    section: '4.6'
    level: MUST
    layer: flow-control
    testable: true
  rfc9000:5.1.1:
    text: "Issuing Connection IDs\n\nAn endpoint that initiates migration and requires non-zero-length\t     An endpoint that\
      \ initiates migration and requires non-zero-length\nconnection IDs SHOULD ensure that the pool of connection IDs\t \
      \       connection IDs SHOULD ensure that the pool of connection IDs\navailable to its peer allows the peer to use a\
      \ new connection ID on\t  available to its peer allows the peer to use a new connection ID on\nmigration, as the peer\
      \ will close the connection if the pool is\t     migration, as the peer will be **unable** to respond if the pool is\n\
      exhausted."
    section: 5.1.1
    level: SHOULD
    layer: connection
    testable: true
  rfc9000:5.2:
    text: "Matching Packets to Connections\n\nInvalid packets without packet protection, such as Initial, Retry, or\t \t \
      \  Invalid packets that lack strong integrity protection, such as\nVersion Negotiation, MAY be discarded."
    section: '5.2'
    level: MAY
    layer: connection
    testable: true
  rfc9000:5.2.2:
    text: "An endpoint MUST generate a\t \t       Initial, Retry, or Version Negotiation, MAY be discarded."
    section: '5.2'
    level: MUST
    layer: connection
    testable: true
  rfc9000:5.2.3:
    text: "An\nconnection error if it commits changes to state before discovering an\t \t   endpoint MUST generate a connection\
      \ error if processing the contents\nerror."
    section: '5.2'
    level: MUST
    layer: connection
    testable: true
  rfc9000:5.2.1:
    text: "Client Packet Handling\n\nIf a client receives a packet that has an **unsupported version**, it\t \t  If a client\
      \ receives a packet that uses a **different version** than it\nMUST discard that packet."
    section: 5.2.1
    level: MUST
    layer: connection
    testable: true
